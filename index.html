<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Uniformes e EPI's| Painel de Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        summary::-webkit-details-marker { display: none; }
        summary { list-style: none; }
        .tab-active { background-color: #2563eb; color: white; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        details[open] .seta-icon { transform: rotate(180deg); }
        .seta-icon { transition: transform 0.2s ease; }
        input, select { outline: none; border: 2px solid #f1f5f9; }
        input:focus, select:focus { border-color: #3b82f6; background-color: white; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col md:flex-row">

    <aside class="w-full md:w-64 bg-slate-900 text-white md:min-h-screen sticky top-0 z-30 shadow-2xl">
        <div class="p-8">
            <h1 class="text-xl font-black tracking-tighter text-blue-400">ESTOQUE VALE DO PARAIBA</h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">SJC - Operacional</p>
        </div>
        <nav class="flex md:flex-col p-3 gap-2 overflow-x-auto md:overflow-x-visible">
            <button onclick="mudarAba('estoque')" id="btn-estoque" class="flex-1 md:flex-none flex items-center gap-3 p-4 rounded-xl text-xs font-black uppercase transition-all tab-active">
                <span>📦   
                    PAINEL
                </span> <span class="hidden md:inline">Estoque</span>
            </button>
            <button onclick="mudarAba('entrada')" id="btn-entrada" class="flex-1 md:flex-none flex items-center gap-3 p-4 rounded-xl text-xs font-black uppercase text-slate-400 hover:bg-slate-800 transition-all">
                <span>➕</span> <span class="hidden md:inline">Entrada</span>
            </button>
            <button onclick="mudarAba('historico')" id="btn-historico" class="flex-1 md:flex-none flex items-center gap-3 p-4 rounded-xl text-xs font-black uppercase text-slate-400 hover:bg-slate-800 transition-all">
                <span>🕒</span> <span class="hidden md:inline">Log</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-6 md:p-10">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h2 id="titulo-pagina" class="text-3xl font-black text-slate-800 uppercase tracking-tight">Estoque Atual</h2>
                <p class="text-sm text-slate-400 font-bold uppercase tracking-tighter">Vale do Paraíba / Auditoria SJC</p>
            </div>
            <button onclick="baixarRelatorio()" class="bg-green-600 hover:bg-green-700 text-white font-black py-4 px-8 rounded-2xl shadow-lg shadow-green-100 text-xs uppercase flex items-center gap-3 transition-all active:scale-95">
                <span class="text-lg">📊</span> Exportar Relatório Excel
            </button>
        </header>

        <div id="aba-estoque" class="block">
            <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 items-start"></div>
        </div>

        <div id="aba-entrada" class="hidden max-w-xl mx-auto">
            <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100">
                <h3 class="text-xl font-black text-slate-800 mb-8 border-b-4 border-blue-600 pb-2 inline-block uppercase">Reposição</h3>
                <div class="space-y-8">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase">Selecionar Material</label>
                        <select id="select-item-entrada" class="w-full p-5 bg-slate-50 rounded-2xl text-sm font-bold uppercase text-slate-700 transition-all"></select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase">Quantidade de Entrada</label>
                        <input type="number" id="qtd-entrada" placeholder="00" class="w-full p-5 bg-slate-50 rounded-2xl text-sm font-bold transition-all">
                    </div>
                    <button onclick="salvarEntrada()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-6 rounded-2xl text-xs uppercase shadow-xl shadow-blue-100 transition-all active:scale-95">
                        Salvar no Sistema
                    </button>
                </div>
            </div>
        </div>

        <div id="aba-historico" class="hidden">
            <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-400 border-b">
                        <tr>
                            <th class="p-6 text-[10px] font-black uppercase tracking-widest">Data / Hora</th>
                            <th class="p-6 text-[10px] font-black uppercase tracking-widest">Item</th>
                            <th class="p-6 text-[10px] font-black uppercase tracking-widest">Responsável / Qtd</th>
                            <th class="p-6 text-[10px] font-black uppercase tracking-widest text-center">Saldo Final</th>
                        </tr>
                    </thead>
                    <tbody id="lista-historico-tabela" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://ppfnzoxakmvvkuuiggtf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KjZ5ay6u32vr_xEISNfreg_P4ZHYM8E';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let dadosLocaisEstoque = [];

        function mudarAba(aba) {
            const titulos = { 'estoque': 'Estoque Atual', 'entrada': 'Entrada de Material', 'historico': 'Log de Movimentações' };
            document.getElementById('titulo-pagina').innerText = titulos[aba];
            ['estoque', 'entrada', 'historico'].forEach(a => {
                document.getElementById(`aba-${a}`).classList.toggle('hidden', a !== aba);
                const btn = document.getElementById(`btn-${a}`);
                if(a === aba) { btn.classList.add('tab-active'); btn.classList.remove('text-slate-400'); }
                else { btn.classList.remove('tab-active'); btn.classList.add('text-slate-400'); }
            });
            if(aba === 'historico') carregarHistorico(); else carregarEstoque();
        }

        async function carregarEstoque() {
            const { data, error } = await _supabase.from('estoque').select('*').order('item');
            if (!error) { dadosLocaisEstoque = data; renderizarEstoque(data); popularSelectEntrada(data); }
        }

        function popularSelectEntrada(itens) {
            document.getElementById('select-item-entrada').innerHTML = itens.map(i => `<option value="${i.id}|${i.saldo_atual}|${i.item}">${i.item}</option>`).join('');
        }

        function renderizarEstoque(itens) {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            const categorias = {};
            itens.forEach(item => {
                const cat = item.item.split(' ')[0].toUpperCase();
                if (!categorias[cat]) categorias[cat] = [];
                categorias[cat].push(item);
            });

            for (const [nome, produtos] of Object.entries(categorias)) {
                const details = document.createElement('details');
                details.open = false; 
                details.className = "bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden group mb-2";
                let htmlItens = produtos.map(p => `
                    <div class="flex justify-between items-center p-5 hover:bg-slate-50 transition-all border-b border-slate-50 last:border-0">
                        <div class="flex-1">
                            <p class="font-black text-slate-800 text-[11px] uppercase tracking-tight">${p.item}</p>
                            <p class="text-[10px] font-black ${p.saldo_atual <= 1 ? 'text-red-500 animate-pulse' : 'text-blue-500'}">SALDO: ${p.saldo_atual}</p>
                        </div>
                        <button onclick="retirar(${p.id}, '${p.item}', ${p.saldo_atual})" class="bg-slate-900 hover:bg-blue-600 text-white font-black py-2 px-4 rounded-xl text-[9px] uppercase transition-all active:scale-95">RETIRAR</button>
                    </div>
                `).join('');
                details.innerHTML = `<summary class="bg-slate-100 p-5 flex justify-between items-center cursor-pointer hover:bg-slate-200 transition-colors"><div class="flex items-center gap-3"><span class="seta-icon text-slate-400 font-bold text-xs">▼</span><h3 class="font-black text-xs text-slate-800 uppercase tracking-widest">${nome}</h3></div><span class="bg-white text-slate-800 px-3 py-1 rounded-full text-[9px] font-black border border-slate-200">${produtos.length}</span></summary><div class="divide-y divide-slate-50">${htmlItens}</div>`;
                container.appendChild(details);
            }
        }

        async function salvarEntrada() {
            const [id, saldoAtual, nomeItem] = document.getElementById('select-item-entrada').value.split('|');
            const qtdInput = document.getElementById('qtd-entrada');
            if(!qtdInput.value || qtdInput.value <= 0) return alert("Quantidade inválida!");
            const novoSaldo = Number(saldoAtual) + Number(qtdInput.value);
            const { error } = await _supabase.from('estoque').update({ saldo_atual: novoSaldo }).eq('id', id);
            if (!error) {
                await _supabase.from('historico').insert([{ data: new Date().toISOString(), tace: 'ENTRADA DE ESTOQUE', item: nomeItem, quantidade: Number(qtdInput.value), saldo_final: novoSaldo }]);
                alert("Entrada registrada!");
                qtdInput.value = ''; mudarAba('estoque');
            }
        }

        async function retirar(id, nomeItem, saldo) {
            if (saldo <= 0) return alert("ESTOQUE ZERADO!");
            
            const nomeTace = prompt(`RETIRADA: ${nomeItem}\nQuem é o recebedor?`);
            if (!nomeTace) return;

            const qtdRetirar = prompt(`Quantas unidades de ${nomeItem} estão sendo retiradas?`, "1");
            if (!qtdRetirar || isNaN(qtdRetirar) || Number(qtdRetirar) <= 0) return alert("Quantidade inválida!");
            
            if (Number(qtdRetirar) > saldo) return alert(`ERRO: Saldo insuficiente! (Disponível: ${saldo})`);

            const novoSaldo = Number(saldo) - Number(qtdRetirar);
            const { error } = await _supabase.from('estoque').update({ saldo_atual: novoSaldo }).eq('id', id);

            if (!error) {
                await _supabase.from('historico').insert([{ 
                    data: new Date().toISOString(), 
                    tace: nomeTace.toUpperCase(), 
                    item: nomeItem, 
                    quantidade: Number(qtdRetirar), 
                    saldo_final: novoSaldo 
                }]);
                alert(`Retirada de ${qtdRetirar} unidades concluída!`);
                carregarEstoque();
            }
        }

        function baixarRelatorio() {
            const dataHoje = new Date().toLocaleDateString('pt-BR');
            const titulo = [ ["SISTEMA DE ESTOQUE TACE - RELATÓRIO"], [`DATA: ${dataHoje}`], [] ];
            const cabecalhos = ["CATEGORIA", "MATERIAL", "SALDO", "STATUS"];
            const corpo = dadosLocaisEstoque.map(i => [ i.item.split(' ')[0].toUpperCase(), i.item.toUpperCase(), i.saldo_atual, i.saldo_atual <= 1 ? "⚠️ REPOR" : "✅ OK" ]);
            const ws = XLSX.utils.aoa_to_sheet(titulo.concat([cabecalhos]).concat(corpo));
            ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 3 } }, { s: { r: 1, c: 0 }, e: { r: 1, c: 3 } }];
            ws['!cols'] = [{ wch: 15 }, { wch: 45 }, { wch: 10 }, { wch: 15 }];
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Estoque");
            XLSX.writeFile(wb, `Relatorio_Estoque_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        async function carregarHistorico() {
            const tabela = document.getElementById('lista-historico-tabela');
            const { data, error } = await _supabase.from('historico').select('*').order('data', { ascending: false }).limit(50);
            if (error) return;
            tabela.innerHTML = data.map(h => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-6 text-[10px] font-bold text-slate-400">${new Date(h.data).toLocaleString('pt-BR')}</td>
                    <td class="p-6 text-xs font-black text-slate-800 uppercase tracking-tighter">${h.item}</td>
                    <td class="p-6">
                        <span class="px-3 py-1.5 rounded-lg text-[9px] font-black uppercase ${h.tace === 'ENTRADA DE ESTOQUE' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-700'}">
                            ${h.tace} (${h.quantidade})
                        </span>
                    </td>
                    <td class="p-6 text-center font-black text-blue-600 text-sm tracking-widest">${h.saldo_final}</td>
                </tr>
            `).join('');
        }

        carregarEstoque();
    </script>
</body>
</html>
